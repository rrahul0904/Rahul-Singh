apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unified-migration-web-demo
  namespace: unified-migration-accelerator
spec:
  rules:
    - host: unified-migration-web-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unified-migration-web-demo
                port:
                  number: 8080
