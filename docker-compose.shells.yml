version: '3.9'
services:
  integrated-api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install fastapi uvicorn pydantic httpx pytest &&
             uvicorn apps.api.app.main_integrated:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"

  stateful-api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install fastapi uvicorn pydantic httpx pytest &&
             uvicorn apps.api.app.main_stateful_phase2:app --host 0.0.0.0 --port 8003"
    ports:
      - "8003:8003"
