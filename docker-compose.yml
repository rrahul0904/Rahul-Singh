version: "3.9"

services:
  web:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev:web"
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - api

  api:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r apps/api/requirements.txt && uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://uma:uma@db:5432/uma
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: uma
      POSTGRES_USER: uma
      POSTGRES_PASSWORD: uma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
