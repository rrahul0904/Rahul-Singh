# ═══════════════════════════════════════════════════════════════
# UMA Platform — Kubernetes Manifests (Base)
# Applies to: EKS (AWS) · AKS (Azure) · GKE (GCP)
# Usage: kubectl apply -k infra/k8s/overlays/aws (or azure / gcp)
# ═══════════════════════════════════════════════════════════════

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: uma
  labels:
    app.kubernetes.io/name: uma-platform

---
# ConfigMap — non-secret configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: uma-config
  namespace: uma
data:
  APP_NAME: "UMA Platform"
  DEBUG: "false"
  MAX_CONCURRENT_JOBS: "10"
  JOB_TIMEOUT_SECONDS: "86400"
  AWS_REGION: "us-east-1"

---
# Secret — sensitive values (fill these in or use external-secrets-operator)
apiVersion: v1
kind: Secret
metadata:
  name: uma-secrets
  namespace: uma
type: Opaque
stringData:
  SNOWFLAKE_ACCOUNT: "your-org-account"
  SNOWFLAKE_USER: "uma_service"
  SNOWFLAKE_PASSWORD: "changeme"
  AWS_ACCESS_KEY_ID: "changeme"
  AWS_SECRET_ACCESS_KEY: "changeme"
  S3_STAGING_BUCKET: "uma-staging-prod"
  ANTHROPIC_API_KEY: "changeme"
  SECRET_KEY: "change-this-to-64-random-chars"
  POSTGRES_PASSWORD: "uma_postgres_pw"

---
# PostgreSQL — StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: uma
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: uma
        - name: POSTGRES_DB
          value: uma
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: uma-secrets
              key: POSTGRES_PASSWORD
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "uma"]
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: uma
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None  # Headless for StatefulSet DNS

---
# Redis — Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: uma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--appendonly", "yes"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: uma
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# UMA API — Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uma-api
  namespace: uma
  labels:
    app: uma-api
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uma-api
  template:
    metadata:
      labels:
        app: uma-api
    spec:
      containers:
      - name: api
        image: your-registry/uma-api:latest  # Replace with your image
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://uma:$(POSTGRES_PASSWORD)@postgres:5432/uma"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        envFrom:
        - configMapRef:
            name: uma-config
        - secretRef:
            name: uma-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: uma-api
  namespace: uma
spec:
  selector:
    app: uma-api
  ports:
  - port: 8000
    targetPort: 8000

---
# UMA Worker — Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uma-worker
  namespace: uma
spec:
  replicas: 3
  selector:
    matchLabels:
      app: uma-worker
  template:
    metadata:
      labels:
        app: uma-worker
    spec:
      containers:
      - name: worker
        image: your-registry/uma-api:latest
        command: ["arq", "workers.arq_worker.WorkerSettings"]
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://uma:$(POSTGRES_PASSWORD)@postgres:5432/uma"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        envFrom:
        - configMapRef:
            name: uma-config
        - secretRef:
            name: uma-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "4000m"

---
# UMA Frontend — Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uma-frontend
  namespace: uma
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uma-frontend
  template:
    metadata:
      labels:
        app: uma-frontend
    spec:
      containers:
      - name: frontend
        image: your-registry/uma-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: uma-frontend
  namespace: uma
spec:
  selector:
    app: uma-frontend
  ports:
  - port: 80
    targetPort: 80

---
# Ingress — NGINX (works on EKS/AKS/GKE with nginx ingress controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uma-ingress
  namespace: uma
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"  # Uncomment for TLS
spec:
  ingressClassName: nginx
  rules:
  - host: uma.yourdomain.com  # Replace with your domain
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: uma-api
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: uma-frontend
            port:
              number: 80

---
# HPA — API auto-scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uma-api-hpa
  namespace: uma
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uma-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
# HPA — Worker auto-scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uma-worker-hpa
  namespace: uma
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uma-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
