###############################################################
# UMA Platform — Nginx Reverse Proxy
# Handles: SSL termination, API proxy, React SPA, gzip, security headers
###############################################################

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 500M;   # Allow large file uploads

    # ── Gzip ──────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;

    # ── Rate limiting ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ── Upstream services ─────────────────────────────────
    upstream api {
        server api:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:5173;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ─────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL — replace with your cert paths
        # For Let's Encrypt: use certbot or cert-manager
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           SAMEORIGIN always;
        add_header X-Content-Type-Options    nosniff always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── API proxy ─────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # SSE / streaming support for long-running jobs
            proxy_buffering    off;
            proxy_cache        off;
        }

        # ── Prometheus metrics (restrict to internal) ─────
        location /metrics {
            allow  10.0.0.0/8;
            allow  172.16.0.0/12;
            allow  192.168.0.0/16;
            allow  127.0.0.1;
            deny   all;
            proxy_pass http://api;
        }

        # ── React SPA ─────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
        }

        # ── Static asset caching ──────────────────────────
        location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
            proxy_pass   http://frontend;
            expires      30d;
            add_header   Cache-Control "public, immutable";
        }
    }
}
